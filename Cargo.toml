[package]
name = "stoffel-mpc-coordinator"
version = "0.1.0"
edition = "2021"

[lib]
path = "src/lib.rs"

# Temporarily disabled - uncomment when SSH auth is configured:
# [[bin]]
# name = "deploy-coordinator"
# path = "src/deploy-coordinator/bin/main.rs"
# required-features = ["ethereum"]

[[bin]]
name = "coordinator"
path = "src/coordinator/bin/main.rs"

[dependencies]
# Ethereum dependencies (optional, for deploy-coordinator)
# Temporarily disabled - uncomment when SSH auth is configured:
# stoffel-solidity-bindings = { version = "0.1.0", git = "ssh://git@github.com/Stoffel-Labs/Stoffel-solidity-SDK.git", branch = "test-coord", optional = true }
# alloy = { version = "1.5.2", features = ["full", "node-bindings"], optional = true }
# alloy-primitives = { version = "1.5.4", optional = true }

# Core dependencies
clap = { version = "4.5.56", features = ["derive"] }
tokio = { version = "1.49.0", features = ["rt-multi-thread", "macros", "sync", "net"] }

# StoffelVM dependencies
# NOTE: Full VM integration is blocked on mpc-protocols compatibility
# The main branch of mpc-protocols has SenderId type errors
# The dev branch compiles but has API changes incompatible with StoffelVM
# For now, use stoffel-vm-types only (for Value type) and keep mock mode
stoffel-vm-types = { path = "../StoffelVM/crates/stoffel-vm-types" }
# stoffel-vm = { path = "../StoffelVM/crates/stoffel-vm" }

# REST API dependencies
axum = { version = "0.7", features = ["macros"] }
tower-http = { version = "0.5", features = ["cors", "trace"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "1.0"
chrono = { version = "0.4", features = ["serde"] }
tower = { version = "0.5", features = ["util"] }
base64 = "0.21"
async-trait = "0.1"

# [features]
# default = []
# ethereum = ["stoffel-solidity-bindings", "alloy", "alloy-primitives"]
